{% extends "base.html" %}

{% block content %}
    <section id="contact-page" class="relative py-16 sm:py-20 lg:py-28 bg-slate-50 overflow-hidden">
        <!-- Background Accent -->
        <div class="absolute top-0 left-0 right-0 h-64 bg-gradient-to-b from-[#1DA9CE]/5 to-transparent pointer-events-none"></div>
        
        <svg class="absolute top-0 left-0 w-full h-auto text-[#1DA9CE]/[0.03]" viewBox="0 0 1440 320" fill="currentColor" preserveAspectRatio="none">
            <path d="M0,96L48,112C96,128,192,160,288,186.7C384,213,480,235,576,213.3C672,192,768,128,864,128C960,128,1056,192,1152,208C1248,224,1344,192,1392,176L1440,160L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"></path>
        </svg>

        <div style="margin-top:80px" class="relative max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid grid-cols-1 lg:grid-cols-2 lg:gap-16 xl:gap-24 lg:items-start">
                
                <!-- Left Column: Contact Info -->
                <div class="mb-12 lg:mb-0 lg:py-6 lg:sticky lg:top-28">
                    <h1 class="font-body text-[30px] text-center sm:text-[36px] lg:text-[44px] xl:text-[48px] font-bold text-slate-800 leading-[1.15] tracking-[-0.02em] mb-8">
                        <span class="text-[#1DA9CE]">Get in</span> touch
                    </h1>
                    
                    <img src="https://media.securiti.ai/wp-content/uploads/2020/05/contact-media.svg" 
                         alt="Contact illustration" class="w-full max-w-xs mx-auto lg:mx-0 h-auto mb-10">
                    
                    <div class="space-y-6">
                        <div>
    <p class="font-body text-[14px] uppercase tracking-widest text-slate-400 font-semibold mb-2">Contact</p>
    <a href="mailto:info@rehnova.digital" class="font-body text-[15px]  text-[#1DA9CE] transition-colors">
        contact@rehnova.digital
    </a>
</div>

<div>
    <p class="font-body text-[14px] uppercase tracking-widest text-slate-400 font-semibold mb-2">Information</p>
    <a href="mailto:contact@rehnova.digital" class="font-body text-[15px]  text-[#1DA9CE] transition-colors">
        info@rehnova.digital
    </a>
</div>
                        <div>
                            <p class="font-body text-[14px] uppercase tracking-widest text-slate-400 font-semibold mb-2">WhatsApp</p>
                            <a href="https://wa.me/923425040554" target="_blank" class="font-body text-[15px] text-[#1DA9CE] transition-colors">
                                +92 342 5040 554
                            </a>
                        </div>
                    </div>
                    
                    <div class="mt-8 pt-6 border-t border-slate-200">
                        <p class="font-body text-[13px] text-slate-500">
                            We read everything. Response time: 
                            <span class="text-[#1DA9CE] font-semibold">1 business day</span>
                        </p>
                    </div>
                </div>

                <!-- Right Column: Contact Form -->
                <div class="bg-white border border-slate-200 p-6 sm:p-8 lg:p-10 shadow-sm">
                    <div id="formError" class="hidden mb-4 p-4 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-[14px] font-medium"></div>
                    
                    <form id="contactForm" novalidate class="space-y-6">
                        <!-- Contact Reason -->
                        <div>
                            <label for="contactReason" class="block font-body text-[13px] font-medium text-slate-700 mb-2">
                                What can we help with? *
                            </label>
                            <select id="contactReason" name="contactReason" required
                                    class="w-full h-12 px-4 bg-white border border-slate-200 focus:outline-none focus:border-[#1DA9CE] focus:bg-slate-50 text-[15px] font-body text-slate-400 focus:text-slate-700 transition-colors appearance-none cursor-pointer">
                                <option value="" disabled selected>Select a reason</option>
                                <option value="feedback">Feedback</option>
                                <option value="suggestion">Suggestion</option>
                                <option value="message">General Message</option>
                                <option value="career">Career Inquiry</option>
                                <option value="partnership">Partnership</option>
                                <option value="other">Other</option>
                            </select>
                            <p class="error-text hidden mt-1 text-[12px] text-red-500 font-body"></p>
                        </div>

                        <!-- Dynamic Form Fields -->
                        <div id="formFields" class="space-y-6 opacity-0 max-h-0 overflow-hidden transition-all duration-500 ease-out">
                            <!-- Name Fields -->
                            <div class="grid grid-cols-2 gap-3 sm:gap-x-5">
                                <div>
                                    <input id="firstName" name="firstName" type="text" required
                                           class="w-full h-12 px-3 sm:px-4 bg-white border border-slate-200 focus:outline-none focus:border-[#1DA9CE] focus:bg-slate-50 text-[15px] font-body placeholder:text-slate-400 transition-colors"
                                           placeholder="First name *">
                                    <p class="error-text hidden mt-1 text-[12px] text-red-500 font-body"></p>
                                </div>
                                <div>
                                    <input id="lastName" name="lastName" type="text" required
                                           class="w-full h-12 px-3 sm:px-4 bg-white border border-slate-200 focus:outline-none focus:border-[#1DA9CE] focus:bg-slate-50 text-[15px] font-body placeholder:text-slate-400 transition-colors"
                                           placeholder="Last name *">
                                    <p class="error-text hidden mt-1 text-[12px] text-red-500 font-body"></p>
                                </div>
                            </div>

                            <!-- Email -->
                            <div>
                                <input id="email" name="email" type="email" required
                                       class="w-full h-12 px-4 bg-white border border-slate-200 focus:outline-none focus:border-[#1DA9CE] focus:bg-slate-50 text-[15px] font-body placeholder:text-slate-400 transition-colors"
                                       placeholder="Email address *">
                                <p class="error-text hidden mt-1 text-[12px] text-red-500 font-body"></p>
                            </div>

                            <!-- Partnership Fields -->
                            <div id="partnershipFields" class="space-y-6 opacity-0 max-h-0 overflow-hidden transition-all duration-500 ease-out">
                                <div>
                                    <input id="companyName" name="companyName" type="text"
                                           class="w-full h-12 px-4 bg-white border border-slate-200 focus:outline-none focus:border-[#1DA9CE] focus:bg-slate-50 text-[15px] font-body placeholder:text-slate-400 transition-colors"
                                           placeholder="Company name">
                                    <p class="error-text hidden mt-1 text-[12px] text-red-500 font-body"></p>
                                </div>
                            </div>

                            <!-- Career Fields -->
                            <div id="careerFields" class="space-y-6 opacity-0 max-h-0 overflow-hidden transition-all duration-500 ease-out">
                                <div>
                                    <input id="position" name="position" type="text"
                                           class="w-full h-12 px-4 bg-white border border-slate-200 focus:outline-none focus:border-[#1DA9CE] focus:bg-slate-50 text-[15px] font-body placeholder:text-slate-400 transition-colors"
                                           placeholder="Position of interest">
                                    <p class="error-text hidden mt-1 text-[12px] text-red-500 font-body"></p>
                                </div>
                            </div>

                            <!-- Message -->
                            <div>
                                <textarea id="message" name="message" rows="5" required
                                          class="w-full px-4 py-3 bg-white border border-slate-200 focus:outline-none focus:border-[#1DA9CE] focus:bg-slate-50 text-[15px] font-body placeholder:text-slate-400 resize-none transition-colors"
                                          placeholder="Your message *"></textarea>
                                <p class="error-text hidden mt-1 text-[12px] text-red-500 font-body"></p>
                            </div>

                            <button type="submit"
                                    class="w-full mt-2 h-12 bg-[#1DA9CE] hover:bg-[#1888A8] text-white text-[15px] font-semibold transition-colors duration-200 font-body disabled:bg-slate-300 disabled:cursor-not-allowed">
                                Send message
                            </button>
                            
                            <p id="formSuccess" class="text-[13px] text-emerald-600 hidden text-center mt-3 font-body">
                                Thanks! We'll reach out within 1 business day.
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 right-0 w-96 h-96 bg-[#1DA9CE]/[0.04] rounded-full blur-3xl translate-x-1/3 translate-y-1/3 pointer-events-none"></div>
    </section>
    <script>
document.addEventListener('DOMContentLoaded', function () {
    const form = document.getElementById('contactForm');
    const formError = document.getElementById('formError');
    const formSuccess = document.getElementById('formSuccess');
    const submitBtn = form.querySelector('button[type="submit"]');
    const contactReason = document.getElementById('contactReason');
    const formFields = document.getElementById('formFields');
    const partnershipFields = document.getElementById('partnershipFields');
    const careerFields = document.getElementById('careerFields');
    const messageField = document.getElementById('message');

    contactReason.addEventListener('change', function () {
        const type = this.value;
        
        formFields.classList.remove('opacity-0', 'max-h-0');
        formFields.classList.add('opacity-100');
        formFields.style.maxHeight = '2000px';
        this.classList.remove('text-slate-400');
        this.classList.add('text-slate-700');

        [partnershipFields, careerFields].forEach(el => {
            el.classList.add('opacity-0', 'max-h-0');
            el.classList.remove('opacity-100');
        });

        if (type === 'partnership') {
            partnershipFields.classList.remove('opacity-0', 'max-h-0');
            partnershipFields.classList.add('opacity-100');
            partnershipFields.style.maxHeight = partnershipFields.scrollHeight + 'px';
            messageField.placeholder = 'Tell us about the partnership opportunity *';
        } else if (type === 'career') {
            careerFields.classList.remove('opacity-0', 'max-h-0');
            careerFields.classList.add('opacity-100');
            careerFields.style.maxHeight = careerFields.scrollHeight + 'px';
            messageField.placeholder = 'Tell us about yourself *';
        } else if (type === 'feedback') {
            messageField.placeholder = 'Share your feedback *';
        } else if (type === 'suggestion') {
            messageField.placeholder = 'What would you suggest? *';
        } else {
            messageField.placeholder = 'Your message *';
        }
    });

    form.addEventListener('submit', async function (e) {
        e.preventDefault();
        formError.classList.add('hidden');
        formSuccess.classList.add('hidden');

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        if (!data.contactReason || !data.firstName || !data.lastName || !data.email || !data.message) {
            return showError('Please fill in all required fields.');
        }

        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email)) {
            return showError('Please enter a valid email address.');
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Sending...';

        try {
            const res = await fetch('/api/contact', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (!res.ok) throw new Error('Failed');

            window.location.href = '/thank-you';
            form.reset();
            formFields.classList.add('opacity-0', 'max-h-0');
            partnershipFields.classList.add('opacity-0', 'max-h-0');
            careerFields.classList.add('opacity-0', 'max-h-0');
            contactReason.classList.add('text-slate-400');
        } catch (err) {
            showError('Failed to send. Email us directly at info@rehnova.digital');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Send message';
        }
    });

    function showError(msg) {
        formError.textContent = msg;
        formError.classList.remove('hidden');
    }
});
</script>

 {% endblock %}
